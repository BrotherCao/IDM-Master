<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDM Master</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    .header {
      padding: 16px;
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header .logo { font-size: 20px; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .status-bar {
      padding: 10px 16px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #2a2a4a;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f44336;
    }
    .status-dot.online { background: #4caf50; }
    .content { padding: 16px; }
    .task-item {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .task-item .name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #1e88e5, #42a5f5);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .task-item .meta {
      font-size: 11px;
      color: #888;
      display: flex;
      justify-content: space-between;
    }
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: #666;
      font-size: 13px;
    }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }
    .footer {
      padding: 12px 16px;
      border-top: 1px solid #2a2a4a;
      text-align: center;
    }
    .footer a {
      color: #1e88e5;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⬇</span>
    <h1>IDM Master</h1>
  </div>
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">检测中...</span>
  </div>
  <div class="content" id="taskList">
    <div class="empty">
      <div class="icon">📂</div>
      <div>暂无活动下载</div>
    </div>
  </div>
  <div class="footer">
    <a id="openClient">打开客户端</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
